name: Weekly Backup Report

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 6:00 UTC
  workflow_dispatch:       

jobs:
  run-backup-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Backup Report Script
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

          MAIL_TENANT_ID: ${{ secrets.MAIL_TENANT_ID }}
          MAIL_CLIENT_ID: ${{ secrets.MAIL_CLIENT_ID }}
          MAIL_CLIENT_SECRET: ${{ secrets.MAIL_CLIENT_SECRET }}

          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

        run: python backup_report.py

      - name: Upload Excel Report
        uses: actions/upload-artifact@v4
        with:
          name: Backup-Explorer-Report
          path: Backup_Explorer_Report.xlsx
